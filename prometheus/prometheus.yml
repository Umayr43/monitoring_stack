global:
  scrape_interval: 15s  # How often Prometheus colllects metrics
  evaluation_interval: 15s #How often it evaluates alert rules

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090'] # Prometheus scrapes itself too

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100'] #using the service name since it is outside the prometheus container